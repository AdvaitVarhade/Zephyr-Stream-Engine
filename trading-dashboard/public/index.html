<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard Benchmark</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-color: #c9d1d9;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .title {
            margin: 0;
            font-size: 24px;
        }
        .controls button {
            background-color: var(--panel-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
            transition: 0.2s;
        }
        .controls button:hover {
            background-color: var(--border-color);
        }
        .controls button.start {
            background-color: #238636;
            color: #ffffff;
            border-color: rgba(240, 246, 252, 0.1);
        }
        .controls button.start:hover { background-color: #2ea043; }
        
        .controls button.burst {
            background-color: #da3633;
            color: #ffffff;
        }
        .controls button.burst:hover { background-color: #f85149; }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
        }
        .panel h3 {
            margin-top: 0;
            font-size: 16px;
            color: #8b949e;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .stat-box {
            text-align: center;
        }
        .stat-box .value {
            font-size: 24px;
            font-weight: bold;
        }
        .stat-box.baseline .value { color: var(--accent-red); }
        .stat-box.antigravity .value { color: var(--accent-green); }
        .stat-box .label {
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">Trading Platform Simulator (Legacy vs Antigravity)</h1>
        <div class="controls">
            <span id="statusLabel" style="margin-right: 15px; font-weight: bold; color: #8b949e;">OFFLINE</span>
            <button id="btnStart" class="start">Start Benchmark</button>
            <button id="btnStop" style="display:none;">Stop Benchmark</button>
            <button id="btnBurst" class="burst" disabled>Inject Burst Traffic</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="panel">
            <h3>Throughput (Events / sec)</h3>
            <div class="chart-container">
                <canvas id="throughputChart"></canvas>
            </div>
            <div class="stats">
                <div class="stat-box baseline">
                    <div class="value" id="valThroughputBase">0</div>
                    <div class="label">Legacy JSON</div>
                </div>
                <div class="stat-box antigravity">
                    <div class="value" id="valThroughputAnti">0</div>
                    <div class="label">Zero-Copy FlatBuffer</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>Tail Latency p99 (µs)</h3>
            <div class="chart-container">
                <canvas id="latencyChart"></canvas>
            </div>
            <div class="stats">
                <div class="stat-box baseline">
                    <div class="value" id="valLatencyBase">0.00</div>
                    <div class="label">Legacy JSON (µs)</div>
                </div>
                <div class="stat-box antigravity">
                    <div class="value" id="valLatencyAnti">0.00</div>
                    <div class="label">Zero-Copy FlatBuffer (µs)</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
